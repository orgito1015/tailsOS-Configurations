# configs/gpg/gpg-agent.conf
# =============================================================================
# GPG agent configuration for Tails OS
# =============================================================================
# USAGE:
#   Session-only:  Install by running:
#                    mkdir -p ~/.gnupg && cp configs/gpg/gpg-agent.conf ~/.gnupg/
#                    gpg-connect-agent reloadagent /bye
#
#   Persistent:    Add to Tails Persistent Storage via the GnuPG feature:
#                    Applications → Tails → Configure Persistent Volume → GnuPG
#                  Then place this file in:
#                    /live/persistence/TailsData_unlocked/gnupg/gpg-agent.conf
#
# NOTE: Tails mounts /live/persistence/TailsData_unlocked/gnupg/ over
#       ~/.gnupg/ when the GnuPG Persistent Storage feature is enabled.
# =============================================================================

# ── Cache settings ────────────────────────────────────────────────────────────

# How long (seconds) GPG keeps a passphrase cached after its last use.
# Default is 600 (10 min).  300 is more conservative for a live session.
default-cache-ttl 300

# Maximum time (seconds) a cached passphrase is kept regardless of use.
# After this, the user must re-enter the passphrase unconditionally.
max-cache-ttl 900

# How long (seconds) GPG keeps an SSH key passphrase cached.
default-cache-ttl-ssh 300
max-cache-ttl-ssh 900

# ── Pinentry ──────────────────────────────────────────────────────────────────

# Use the GTK pinentry dialog (works in the GNOME desktop of Tails).
# Alternatives:
#   pinentry-program /usr/bin/pinentry-curses   (terminal, useful over SSH)
#   pinentry-program /usr/bin/pinentry-tty      (minimal TTY)
pinentry-program /usr/bin/pinentry-gnome3

# ── Security ──────────────────────────────────────────────────────────────────

# Disable the extra (legacy) loopback pinentry mode.
# Required for some GnuPG 2.1+ workflows where a calling program handles
# its own passphrase entry — leave off unless you have a specific need.
# allow-loopback-pinentry

# Disable the gpg-agent SSH support unless you use GPG keys for SSH.
# Remove the '#' to enable GPG-based SSH authentication.
# enable-ssh-support
