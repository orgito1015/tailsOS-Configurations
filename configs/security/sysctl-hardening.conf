# configs/security/sysctl-hardening.conf
# =============================================================================
# Kernel hardening sysctl parameters for Tails OS 6.x
# =============================================================================
# USAGE:
#   Session-only:    sudo sysctl -p configs/security/sysctl-hardening.conf
#   Via script:      bash scripts/02-security-hardening.sh
#   Persistently:    bash scripts/05-persistent-setup.sh
#
# Parameters are grouped by category.  All values are appropriate for a
# Tails live session.  They do NOT modify Tails' Tor-enforcement chain.
# =============================================================================

# ==============================================================================
# KERNEL HARDENING
# ==============================================================================

# Address Space Layout Randomisation — full randomisation
kernel.randomize_va_space = 2

# Restrict process tracing to parent–child relationships
kernel.yama.ptrace_scope = 1

# Hide kernel symbol addresses from unprivileged users
kernel.kptr_restrict = 2

# Restrict dmesg output to root
kernel.dmesg_restrict = 1

# Restrict hardware performance event access
kernel.perf_event_paranoid = 3

# Disable SysRq magic key (prevents console memory dump / kill shortcuts)
kernel.sysrq = 0

# Disable core dumps for all processes
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0

# ==============================================================================
# FILESYSTEM PROTECTIONS
# ==============================================================================

# Prevent hard-link attacks (e.g. TOCTOU vulnerabilities)
fs.protected_hardlinks = 1

# Prevent symlink attacks in world-writable directories
fs.protected_symlinks = 1

# Protect FIFOs in world-writable sticky directories
fs.protected_fifos = 2

# Protect regular files in world-writable sticky directories
fs.protected_regular = 2

# ==============================================================================
# NETWORK — IPv4 HARDENING
# ==============================================================================

# Disable IP source routing (prevents packet spoofing)
net.ipv4.conf.all.accept_source_route     = 0
net.ipv4.conf.default.accept_source_route = 0

# Reject ICMP redirect messages (prevents routing table modification)
net.ipv4.conf.all.accept_redirects     = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects     = 0
net.ipv4.conf.default.secure_redirects = 0

# Do not send ICMP redirects
net.ipv4.conf.all.send_redirects     = 0
net.ipv4.conf.default.send_redirects = 0

# Enable reverse-path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter     = 1
net.ipv4.conf.default.rp_filter = 1

# Enable SYN cookies (SYN flood protection)
net.ipv4.tcp_syncookies = 1

# Ignore ICMP broadcast pings (prevents smurf attacks)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Log packets from impossible addresses (martian packets)
net.ipv4.conf.all.log_martians     = 1
net.ipv4.conf.default.log_martians = 1

# Disable TCP timestamps (prevents clock fingerprinting)
net.ipv4.tcp_timestamps = 0

# Disable TCP Selective ACK (mitigates SACK-based DoS: CVE-2019-11477 family)
net.ipv4.tcp_sack = 0

# ==============================================================================
# NETWORK — IPv6
# ==============================================================================

# Disable IPv6 completely (Tails routes IPv6 through Tor but it is
# not needed for most use cases and increases attack surface)
net.ipv6.conf.all.disable_ipv6     = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6      = 1

# ==============================================================================
# BPF / JIT HARDENING
# ==============================================================================

# Harden the BPF JIT compiler
net.core.bpf_jit_harden = 2
